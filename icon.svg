<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="412" y="200" width="200" height="380" rx="100" ry="100"
        fill="none" stroke="#E0E0E0" stroke-width="32"/>
  <!-- Mic grille lines -->
  <line x1="445" y1="340" x2="579" y2="340" stroke="#E0E0E0" stroke-width="12" stroke-linecap="round"/>
  <line x1="445" y1="400" x2="579" y2="400" stroke="#E0E0E0" stroke-width="12" stroke-linecap="round"/>
  <line x1="445" y1="460" x2="579" y2="460" stroke="#E0E0E0" stroke-width="12" stroke-linecap="round"/>
  <!-- Arc below mic -->
  <path d="M330 480 Q330 680 512 680 Q694 680 694 480"
        fill="none" stroke="#E0E0E0" stroke-width="32" stroke-linecap="round"/>
  <!-- Vertical stem -->
  <line x1="512" y1="680" x2="512" y2="790" stroke="#E0E0E0" stroke-width="32" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="400" y1="790" x2="624" y2="790" stroke="#E0E0E0" stroke-width="32" stroke-linecap="round"/>
</svg>
